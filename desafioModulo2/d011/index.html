<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        picture img {
            display: block;
            margin: 0 auto;
        }

        #astro {
            transform: translateY(-400px)
        }

        .container {
            position: relative;
            display: block;
            margin: auto;
        }

        .espa {
            
        }

        .astron {
            position: absolute;
            top: 0px;
            left: 120px;
        
        }
    </style>
</head>
<body>
    <h1>Desafio do Astronauta</h1>
    <picture>
        <img src="espaco.jpg" id="espaco" alt="" width="700px">
        <img src="astronauta.png" id="astro" alt="" width="400px">
    </picture>

    <div class="container">
        <img src="espaco.jpg" class="espa" alt="" width="700px">
        <img src="astronauta.png" class="astron" alt="" width="400px">
    </div>

</html>
