<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags</title>
</head>
<body>
    <h1>Tags em HTML</h1>
    <p>Em HTML5, podemos inserir os elementos da lista a seguir. Passe o mouse sobre os termos para descobrir qual tag deverá utilizar para utilizar em cada caso</p>
    
    <ul>
        <li><abbr title="use a tag <p>">Parágrafos</abbr></li>
        <li><abbr title="use as tags <h1>.. <h2>... vai até <h6>">Títulos</abbr></li>
        <li><abbr title="use a tag <img>">Imagens</abbr>
        <li><abbr title="use a tag <abbr>">Abreviações</abbr></li>
        <li><abbr title="use a tag <code>">Códigos-Fonte</abbr></li>
        <li><abbr title="use a tag <ol> e <li>">Lista numerada</abbr></li>
        <li><abbr title="use a tag <ul> e <li>">Lista com demarcadores</abbr></li>
    </ul>
</body>
</html>
