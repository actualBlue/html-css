<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavScript</title>
    <style>
        body {
            background-color: gainsboro;
        }
    </style>
</head>
<body>
    <a href="#" onclick="clicou()">Clique em Mim</a>
    <div id="saida"></div>



    <script>
        function clicou() {
            s = window.document.getElementById('saida')
            s.innerHTML += '<p>Você clicouu</p>'
        }
    </script>
</body>
</html>
